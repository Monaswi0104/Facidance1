# ─── Upstreams ───────────────────────────────────────────────
upstream frontend  { server frontend:3000; }
upstream auth      { server auth:8000; }
upstream admin_svc { server admin:8001; }
upstream teacher   { server teacher:8002; }
upstream student   { server student:8003; }
# face (8004) intentionally NOT listed — internal only via face_net.

# ─── HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    server_name facidance.online www.facidance.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS SERVER ────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name facidance.online www.facidance.online;

    ssl_certificate     /etc/letsencrypt/live/facidance.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/facidance.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    # ───────── AUTH ─────────
    location /auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://auth/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───────── ADMIN ─────────
    location /admin-api/ {
        limit_req zone=api burst=30 nodelay;
        rewrite ^/admin-api/(.*)$ /$1 break;
        proxy_pass http://admin_svc;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───────── TEACHER — CPU-heavy face endpoints (strict limits) ─────────
    # These proxy internally to face:8004 for ML work.
    # Limits: 2 req/min per IP for train/run, 3 req/min for recognize.
    # Long timeouts retained — training genuinely takes minutes.

    location = /teacher-api/teacher/attendance/train-student {
        limit_req zone=face_heavy burst=2 nodelay;
        rewrite ^/teacher-api/(.*)$ /$1 break;
        proxy_pass http://teacher;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        send_timeout          600s;
        proxy_buffering off;
        proxy_cache     off;
    }

    location = /teacher-api/teacher/attendance/run-training {
        limit_req zone=face_heavy burst=2 nodelay;
        rewrite ^/teacher-api/(.*)$ /$1 break;
        proxy_pass http://teacher;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        send_timeout          600s;
        proxy_buffering off;
        proxy_cache     off;
    }

    location = /teacher-api/teacher/attendance/recognize {
        limit_req zone=face_heavy burst=3 nodelay;
        rewrite ^/teacher-api/(.*)$ /$1 break;
        proxy_pass http://teacher;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        send_timeout          600s;
        proxy_buffering off;
        proxy_cache     off;
    }

    # ───────── TEACHER — all other endpoints ─────────
    location /teacher-api/ {
        limit_req zone=api burst=30 nodelay;
        rewrite ^/teacher-api/(.*)$ /$1 break;
        proxy_pass http://teacher;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───────── STUDENT ─────────
    location /student-api/ {
        limit_req zone=api burst=30 nodelay;
        rewrite ^/student-api/(.*)$ /$1 break;
        proxy_pass http://student;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NOTE: /face-api/ deliberately absent.
    # face:8004 lives on face_net (internal:true) — unreachable from nginx.

    # ───────── FRONTEND ─────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}