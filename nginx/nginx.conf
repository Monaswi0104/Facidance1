worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting zones ───────────────────────────────────
    # General API endpoints: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/m;

    # Auth endpoints: 10 req/min per IP
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;

    # Face/ML endpoints (train-student, run-training, recognize):
    # 2 req/min per IP — these are CPU-intensive and fan out to the
    # face model service. Tight limit prevents a single authenticated
    # user from DOSing the ML worker.
    limit_req_zone $binary_remote_addr zone=face_heavy:10m rate=2r/m;

    # Return 429 (not 503) when rate limit is hit — clearer for clients
    limit_req_status 429;

    # ── Global proxy timeouts ─────────────────────────────────
    # High values cover face model training (can take 5-10 min on CPU).
    # Per-location overrides in conf.d are kept for explicitness.
    proxy_connect_timeout 600s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    send_timeout          600s;

    include /etc/nginx/conf.d/*.conf;
}